name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore HybridOutbox.sln

      - name: Build
        run: dotnet build HybridOutbox.sln --no-restore --configuration Release

      - name: Test (unit)
        run: dotnet test tests/HybridOutbox.Tests/HybridOutbox.Tests.csproj --no-build --configuration Release --verbosity normal
